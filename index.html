<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiTV Digital Life OS | Master Book Generator</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =====================================================================
           [1] MASSIVE CSS VARIABLES & THEMING
           ===================================================================== */
        :root {
            --bg-color: #050505; --surface-color: #121212; --panel-color: #1e1e1e;
            --mitv-blue: #00f3ff; --mitv-purple: #bc13fe; --mitv-green: #00ff66;
            --text-light: #ffffff; --text-muted: #a0a0a0;
            --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
            --shadow-glow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-light); overflow-x: hidden; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--mitv-blue), var(--mitv-purple)); border-radius: 10px; }

        /* =====================================================================
           [2] AUTH & PIN SCREENS (BEAUTIFUL ANIMATIONS)
           ===================================================================== */
        .screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: var(--bg-color);
            z-index: 1000; transition: opacity 0.5s ease;
        }
        .hidden { opacity: 0; pointer-events: none; z-index: -1; }
        
        .auth-box {
            background: var(--glass-bg); padding: 40px; border-radius: 20px;
            border: 1px solid var(--glass-border); text-align: center;
            backdrop-filter: blur(15px); box-shadow: var(--shadow-glow);
            animation: float 4s ease-in-out infinite; width: 90%; max-width: 400px;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .google-btn {
            background: #fff; color: #000; padding: 12px 24px; border-radius: 30px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px;
            margin-top: 20px; transition: 0.3s; width: 100%; justify-content: center;
        }
        .google-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(255,255,255,0.3); }

        .pin-display { display: flex; gap: 15px; margin: 30px 0; }
        .pin-dot { width: 20px; height: 20px; border: 2px solid var(--mitv-blue); border-radius: 50%; }
        .pin-dot.filled { background: var(--mitv-blue); box-shadow: 0 0 10px var(--mitv-blue); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .key-btn {
            width: 70px; height: 70px; border-radius: 50%; background: var(--panel-color);
            border: 1px solid var(--glass-border); color: #fff; font-size: 24px;
            cursor: pointer; transition: 0.2s;
        }
        .key-btn:active { background: var(--mitv-blue); color: #000; }

        /* =====================================================================
           [3] MAIN DASHBOARD & CALENDAR
           ===================================================================== */
        .dashboard { padding: 20px; max-width: 1200px; margin: 0 auto; display: none; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        
        .grid-layout { display: grid; grid-template-columns: 300px 1fr; gap: 30px; }
        @media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } }

        /* Calendar Sidebar */
        .calendar-widget { background: var(--surface-color); padding: 20px; border-radius: 15px; border: 1px solid var(--glass-border); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: var(--mitv-purple); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { padding: 10px 0; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .cal-day:hover { background: var(--glass-bg); }
        .cal-day.active { background: var(--mitv-blue); color: #000; font-weight: bold; }
        .cal-day.has-data { border-bottom: 2px solid var(--mitv-purple); }

        /* Main Form Area */
        .editor-panel { background: var(--surface-color); padding: 30px; border-radius: 15px; border: 1px solid var(--glass-border); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--mitv-blue); font-size: 14px; text-transform: uppercase; }
        .mitv-input {
            width: 100%; padding: 15px; background: var(--bg-color); border: 1px solid var(--glass-border);
            border-radius: 10px; color: #fff; outline: none; transition: 0.3s;
        }
        .mitv-input:focus { border-color: var(--mitv-purple); }
        
        .action-btn {
            background: linear-gradient(45deg, var(--mitv-blue), var(--mitv-purple));
            color: #fff; border: none; padding: 15px 30px; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%;
        }
        .action-btn:hover { box-shadow: var(--shadow-glow); }

        /* Media Controls */
        .media-bar { display: flex; gap: 15px; margin-top: 20px; background: var(--panel-color); padding: 15px; border-radius: 10px; }
        .media-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; background: var(--glass-bg); color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.3s; }
        .media-btn:hover { background: var(--mitv-blue); color: #000; }
        .recording { animation: pulseRed 1.5s infinite; background: rgba(255, 0, 0, 0.2) !important; color: #ff4444 !important; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.4); } 70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0; } }

        /* =====================================================================
           [4] 3D HTML BOOK VIEWER (ANIMATED)
           ===================================================================== */
        #book-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; justify-content: center; align-items: center; perspective: 1500px;
        }
        .book { width: 400px; height: 550px; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
        @media (max-width: 500px) { .book { width: 300px; height: 450px; } }
        
        .page {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            background: #fff; color: #000; border-radius: 5px 20px 20px 5px;
            transform-origin: left; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            box-shadow: inset 5px 0 20px rgba(0,0,0,0.2), 5px 5px 15px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; padding: 30px; overflow-y: auto;
        }
        .page.flipped { transform: rotateY(-180deg); }
        
        .book-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; z-index: 2001; }
        .book-nav { position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        .b-btn { background: var(--mitv-blue); border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="auth-box">
            <h1 style="color: var(--mitv-blue); font-size: 32px;">MiTV Life OS</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Secure Firebase Authentication</p>
            <div class="google-btn" onclick="AuthManager.loginWithGoogle()">
                <i class="fab fa-google" style="color: #db4437; font-size: 20px;"></i> Continue with Google
            </div>
        </div>
    </div>

    <div id="pin-screen" class="screen hidden">
        <div class="auth-box">
            <h2 id="pin-title" style="color: var(--mitv-purple);">Enter Security PIN</h2>
            <p id="pin-subtitle" class="text-muted">Loading user profile...</p>
            
            <div class="pin-display" id="pin-dots">
                <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
            </div>

            <div class="keypad">
                <button class="key-btn" onclick="AuthManager.pressKey(1)">1</button>
                <button class="key-btn" onclick="AuthManager.pressKey(2)">2</button>
                <button class="key-btn" onclick="AuthManager.pressKey(3)">3</button>
                <button class="key-btn" onclick="AuthManager.pressKey(4)">4</button>
                <button class="key-btn" onclick="AuthManager.pressKey(5)">5</button>
                <button class="key-btn" onclick="AuthManager.pressKey(6)">6</button>
                <button class="key-btn" onclick="AuthManager.pressKey(7)">7</button>
                <button class="key-btn" onclick="AuthManager.pressKey(8)">8</button>
                <button class="key-btn" onclick="AuthManager.pressKey(9)">9</button>
                <button class="key-btn" style="background: transparent; border: none;"></button>
                <button class="key-btn" onclick="AuthManager.pressKey(0)">0</button>
                <button class="key-btn" onclick="AuthManager.clearPin()" style="font-size: 16px;"><i class="fas fa-backspace"></i></button>
            </div>
        </div>
    </div>

    <div id="main-dashboard" class="dashboard">
        <div class="header-nav">
            <div>
                <h2>Welcome, <span id="user-display-name" style="color: var(--mitv-blue);">Maaz</span></h2>
                <p id="system-status" style="color: var(--mitv-green); font-size: 12px;">● Firebase Connected | Kasur Server</p>
            </div>
            <button onclick="AuthManager.logout()" style="background: transparent; border: 1px solid red; color: red; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Logout</button>
        </div>

        <div class="grid-layout">
            <div class="calendar-widget">
                <div class="cal-header">
                    <button onclick="CalendarEngine.prevMonth()" style="background:none;border:none;color:#fff;cursor:pointer;"><i class="fas fa-chevron-left"></i></button>
                    <h3 id="cal-month-year">March 2026</h3>
                    <button onclick="CalendarEngine.nextMonth()" style="background:none;border:none;color:#fff;cursor:pointer;"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="cal-grid" style="color: var(--text-muted); font-size: 12px; margin-bottom: 10px;">
                    <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
                </div>
                <div id="calendar-days" class="cal-grid">
                    </div>
                
                <div style="margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
                    <h4 style="color: var(--mitv-blue); margin-bottom: 10px;">Memory Actions</h4>
                    <button onclick="BookEngine.generateBook()" class="action-btn" style="font-size: 14px; padding: 10px;">📖 Open 3D Story Book</button>
                </div>
            </div>

            <div class="editor-panel">
                <h3 style="margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">
                    Log for: <span id="selected-date-label" style="color: var(--mitv-blue);">Today</span>
                </h3>

                <div style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 1;">
                        <label><i class="fas fa-bed"></i> Slept At</label>
                        <input type="time" id="val-sleep" class="mitv-input">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label><i class="fas fa-sun"></i> Woke Up</label>
                        <input type="time" id="val-wake" class="mitv-input">
                    </div>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-utensils"></i> Meals Today</label>
                    <input type="text" id="val-breakfast" class="mitv-input" placeholder="Breakfast (Nashta)..." style="margin-bottom: 10px;">
                    <input type="text" id="val-lunch" class="mitv-input" placeholder="Lunch (Dopehar)..." style="margin-bottom: 10px;">
                    <input type="text" id="val-dinner" class="mitv-input" placeholder="Dinner (Raat)...">
                </div>

                <div class="input-group">
                    <label><i class="fas fa-book-open"></i> Today's Story / Reminder</label>
                    <textarea id="val-story" class="mitv-input" rows="5" placeholder="Aaj ICS ki padhai mein kya kiya? Ya MiTV ka kya naya update hai?"></textarea>
                </div>

                <div class="media-bar">
                    <button id="btn-location" class="media-btn" onclick="MediaEngine.getLocation()">
                        <i class="fas fa-map-marker-alt" style="font-size: 20px;"></i> Add Location
                    </button>
                    <button id="btn-mic" class="media-btn" onclick="MediaEngine.toggleRecording()">
                        <i class="fas fa-microphone" style="font-size: 20px;"></i> Record Audio
                    </button>
                    <label class="media-btn" style="cursor: pointer;">
                        <i class="fas fa-camera" style="font-size: 20px;"></i> Add Image
                        <input type="file" id="val-image" accept="image/*" style="display: none;" onchange="MediaEngine.handleImage(event)">
                    </label>
                </div>
                
                <div id="media-status" style="font-size: 12px; color: var(--mitv-green); margin: 10px 0;"></div>

                <button onclick="DataEngine.saveDailyLog()" class="action-btn" style="margin-top: 20px;">
                    <i class="fas fa-cloud-upload-alt"></i> SAVE TO FIREBASE SECURE CORE
                </button>
            </div>
        </div>
    </div>

    <div id="book-overlay">
        <div class="book-close" onclick="BookEngine.closeBook()">&times;</div>
        <div class="book" id="3d-book-container">
            </div>
        <div class="book-nav">
            <button class="b-btn" onclick="BookEngine.prevPage()">Previous</button>
            <button class="b-btn" onclick="BookEngine.nextPage()">Next Page</button>
        </div>
    </div>

    <script>
        // ---------------------------------------------------------
        // A. FIREBASE SETUP (Replace with your actual config later)
        // ---------------------------------------------------------
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com"
        };
        // Initialize Firebase
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let selectedDateStr = new Date().toISOString().split('T')[0];

        // ---------------------------------------------------------
        // B. AUTHENTICATION & PIN MANAGER
        // ---------------------------------------------------------
        const AuthManager = {
            pinBuffer: "",
            isSettingPin: false,
            expectedPin: null,

            init() {
                auth.onAuthStateChanged(user => {
                    if (user) {
                        currentUser = user;
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('user-display-name').innerText = user.displayName;
                        this.checkUserPin();
                    } else {
                        document.getElementById('login-screen').classList.remove('hidden');
                        document.getElementById('main-dashboard').style.display = 'none';
                    }
                });
            },
            loginWithGoogle() {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(error => alert("Login Failed: " + error.message));
            },
            logout() { auth.signOut(); location.reload(); },
            
            checkUserPin() {
                // Check Firebase for existing PIN
                db.ref('users/' + currentUser.uid + '/security/pin').once('value', snapshot => {
                    const pin = snapshot.val();
                    document.getElementById('pin-screen').classList.remove('hidden');
                    
                    if (pin) {
                        this.isSettingPin = false;
                        this.expectedPin = pin;
                        document.getElementById('pin-title').innerText = "Enter Security PIN";
                        document.getElementById('pin-subtitle').innerText = "To unlock your diary";
                    } else {
                        this.isSettingPin = true;
                        document.getElementById('pin-title').innerText = "Create New PIN";
                        document.getElementById('pin-subtitle').innerText = "Set a 4-digit security code";
                    }
                });
            },
            pressKey(num) {
                if (this.pinBuffer.length < 4) {
                    this.pinBuffer += num;
                    this.updateDots();
                    if (this.pinBuffer.length === 4) {
                        setTimeout(() => this.processPin(), 300);
                    }
                }
            },
            clearPin() { this.pinBuffer = ""; this.updateDots(); },
            updateDots() {
                const dots = document.querySelectorAll('.pin-dot');
                dots.forEach((dot, index) => {
                    if (index < this.pinBuffer.length) dot.classList.add('filled');
                    else dot.classList.remove('filled');
                });
            },
            processPin() {
                if (this.isSettingPin) {
                    // Save new PIN to Firebase
                    db.ref('users/' + currentUser.uid + '/security/pin').set(this.pinBuffer)
                        .then(() => {
                            alert("PIN Set Successfully!");
                            this.unlockDashboard();
                        });
                } else {
                    // Verify PIN
                    if (this.pinBuffer === this.expectedPin) {
                        this.unlockDashboard();
                    } else {
                        alert("Incorrect PIN!");
                        this.clearPin();
                    }
                }
            },
            unlockDashboard() {
                document.getElementById('pin-screen').classList.add('hidden');
                document.getElementById('main-dashboard').style.display = 'block';
                CalendarEngine.init();
                DataEngine.loadDailyLog(selectedDateStr);
            }
        };

        // ---------------------------------------------------------
        // C. CALENDAR ENGINE (Date Math & UI)
        // ---------------------------------------------------------
        const CalendarEngine = {
            currentDate: new Date(),
            
            init() { this.renderCalendar(); },
            renderCalendar() {
                const year = this.currentDate.getFullYear();
                const month = this.currentDate.getMonth();
                
                const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                document.getElementById('cal-month-year').innerText = `${monthNames[month]} ${year}`;
                
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                
                const calGrid = document.getElementById('calendar-days');
                calGrid.innerHTML = '';
                
                // Empty slots
                for (let i = 0; i < firstDay; i++) {
                    calGrid.innerHTML += `<div></div>`;
                }
                
                // Days
                for (let i = 1; i <= daysInMonth; i++) {
                    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    const div = document.createElement('div');
                    div.className = 'cal-day';
                    div.innerText = i;
                    
                    if (dateStr === selectedDateStr) div.classList.add('active');
                    
                    div.onclick = () => {
                        selectedDateStr = dateStr;
                        document.getElementById('selected-date-label').innerText = dateStr;
                        this.renderCalendar();
                        DataEngine.loadDailyLog(dateStr);
                    };
                    calGrid.appendChild(div);
                }
                
                // Highlight days that have data in Firebase
                this.checkDaysWithData(year, month);
            },
            checkDaysWithData(year, month) {
                if(!currentUser) return;
                const monthPrefix = `${year}-${String(month+1).padStart(2,'0')}`;
                db.ref('users/' + currentUser.uid + '/logs').orderByKey().startAt(monthPrefix + "-01").endAt(monthPrefix + "-31")
                  .once('value', snap => {
                      const data = snap.val();
                      if(data) {
                          const days = document.querySelectorAll('.cal-day');
                          days.forEach(day => {
                              const dStr = `${monthPrefix}-${String(day.innerText).padStart(2,'0')}`;
                              if(data[dStr]) day.classList.add('has-data');
                          });
                      }
                  });
            },
            prevMonth() { this.currentDate.setMonth(this.currentDate.getMonth() - 1); this.renderCalendar(); },
            nextMonth() { this.currentDate.setMonth(this.currentDate.getMonth() + 1); this.renderCalendar(); }
        };

        // ---------------------------------------------------------
        // D. HARDWARE & MEDIA ENGINE (Mic, Geo, Image)
        // ---------------------------------------------------------
        const MediaEngine = {
            currentLocation: null,
            audioBase64: null,
            imageBase64: null,
            mediaRecorder: null,
            audioChunks: [],
            isRecording: false,

            getLocation() {
                const status = document.getElementById('media-status');
                status.innerText = "Fetching GPS Location...";
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        this.currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        status.innerText = `Location Saved! (Lat: ${pos.coords.latitude.toFixed(2)})`;
                        document.getElementById('btn-location').style.background = "var(--mitv-green)";
                        document.getElementById('btn-location').style.color = "#000";
                    }, err => alert("GPS Error: " + err.message));
                } else {
                    alert("Geolocation not supported by this browser.");
                }
            },
            
            async toggleRecording() {
                const btn = document.getElementById('btn-mic');
                const status = document.getElementById('media-status');

                if (!this.isRecording) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        this.mediaRecorder = new MediaRecorder(stream);
                        this.audioChunks = [];
                        
                        this.mediaRecorder.ondataavailable = e => this.audioChunks.push(e.data);
                        this.mediaRecorder.onstop = () => {
                            const audioBlob = new Blob(this.audioChunks, { type: 'audio/webm' });
                            const reader = new FileReader();
                            reader.readAsDataURL(audioBlob);
                            reader.onloadend = () => {
                                this.audioBase64 = reader.result;
                                status.innerText = "Audio Voice Note Saved!";
                                btn.style.background = "var(--mitv-green)";
                                btn.style.color = "#000";
                            }
                        };
                        
                        this.mediaRecorder.start();
                        this.isRecording = true;
                        btn.classList.add('recording');
                        btn.innerHTML = '<i class="fas fa-stop"></i> Stop Rec';
                        status.innerText = "Recording Mic...";
                    } catch (err) { alert("Mic Access Denied: " + err.message); }
                } else {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                    btn.classList.remove('recording');
                    btn.innerHTML = '<i class="fas fa-microphone"></i> Audio Saved';
                }
            },

            handleImage(event) {
                const file = event.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.imageBase64 = e.target.result;
                        document.getElementById('media-status').innerText = "Image Uploaded to Memory!";
                    };
                    reader.readAsDataURL(file);
                }
            },
            
            clearMedia() {
                this.currentLocation = null; this.audioBase64 = null; this.imageBase64 = null;
                document.getElementById('media-status').innerText = "";
                document.getElementById('btn-location').style = "";
                document.getElementById('btn-mic').innerHTML = '<i class="fas fa-microphone"></i> Record Audio';
                document.getElementById('btn-mic').style = "";
            }
        };

        // ---------------------------------------------------------
        // E. DATA ENGINE (Save & Load to Firebase Realtime DB)
        // ---------------------------------------------------------
        const DataEngine = {
            saveDailyLog() {
                const data = {
                    sleep: document.getElementById('val-sleep').value,
                    wake: document.getElementById('val-wake').value,
                    breakfast: document.getElementById('val-breakfast').value,
                    lunch: document.getElementById('val-lunch').value,
                    dinner: document.getElementById('val-dinner').value,
                    story: document.getElementById('val-story').value,
                    location: MediaEngine.currentLocation,
                    audio: MediaEngine.audioBase64,
                    image: MediaEngine.imageBase64,
                    timestamp: new Date().getTime()
                };

                db.ref('users/' + currentUser.uid + '/logs/' + selectedDateStr).set(data)
                    .then(() => {
                        alert("✅ Log Saved to Firebase Securely!");
                        CalendarEngine.renderCalendar(); // Refresh calendar dots
                    })
                    .catch(e => alert("Error saving: " + e.message));
            },

            loadDailyLog(dateStr) {
                // Clear UI first
                document.getElementById('val-sleep').value = ''; document.getElementById('val-wake').value = '';
                document.getElementById('val-breakfast').value = ''; document.getElementById('val-lunch').value = '';
                document.getElementById('val-dinner').value = ''; document.getElementById('val-story').value = '';
                MediaEngine.clearMedia();

                if(!currentUser) return;
                
                db.ref('users/' + currentUser.uid + '/logs/' + dateStr).once('value', snapshot => {
                    const data = snapshot.val();
                    if(data) {
                        if(data.sleep) document.getElementById('val-sleep').value = data.sleep;
                        if(data.wake) document.getElementById('val-wake').value = data.wake;
                        if(data.breakfast) document.getElementById('val-breakfast').value = data.breakfast;
                        if(data.lunch) document.getElementById('val-lunch').value = data.lunch;
                        if(data.dinner) document.getElementById('val-dinner').value = data.dinner;
                        if(data.story) document.getElementById('val-story').value = data.story;
                        
                        // Note: To keep DB lightweight, media base64 might need Firebase Storage in real production,
                        // but storing in Realtime DB works for this exact requirement constraints.
                    }
                });
            }
        };

        // ---------------------------------------------------------
        // F. 3D HTML BOOK GENERATOR (The Magic Logic)
        // ---------------------------------------------------------
        const BookEngine = {
            currentPage: 0,
            totalPages: 0,
            
            generateBook() {
                if(!currentUser) return;
                
                // Fetch all data to create book
                db.ref('users/' + currentUser.uid + '/logs').orderByKey().once('value', snapshot => {
                    const allLogs = snapshot.val();
                    if(!allLogs) { alert("No memory logs found to create a book."); return; }
                    
                    const bookContainer = document.getElementById('3d-book-container');
                    bookContainer.innerHTML = '';
                    
                    // Cover Page
                    this.createPageElement("book-cover", `
                        <h1 style="font-size: 30px; margin-top: 50px; text-align:center; color: var(--mitv-blue);">My Life Diary</h1>
                        <h3 style="text-align:center; margin-top: 20px;">Author: Maaz Iqbal</h3>
                        <div style="text-align:center; margin-top: 100px;"><i class="fas fa-book" style="font-size: 80px; color: #ccc;"></i></div>
                    `, 0);

                    let pageIndex = 1;
                    
                    // Content Pages (Looping through Firebase Data)
                    for(const [date, data] of Object.entries(allLogs)) {
                        let htmlContent = `
                            <h2 style="border-bottom: 2px solid #ccc; padding-bottom: 10px; color: #333;">${date}</h2>
                            <p><strong>Sleep Cycle:</strong> ${data.sleep || '--'} to ${data.wake || '--'}</p>
                            <div style="margin: 15px 0; font-style: italic; color: #555;">
                                <p><strong>Nashta:</strong> ${data.breakfast || 'N/A'}</p>
                                <p><strong>Dopehar:</strong> ${data.lunch || 'N/A'}</p>
                                <p><strong>Raat:</strong> ${data.dinner || 'N/A'}</p>
                            </div>
                            <p style="font-size: 14px; line-height: 1.6;">${data.story || 'No story written for this day.'}</p>
                        `;
                        
                        if(data.image) {
                            htmlContent += `<div style="margin-top:15px; text-align:center;"><img src="${data.image}" style="max-width:100%; max-height: 120px; border-radius:10px; box-shadow:0 5px 10px rgba(0,0,0,0.2);"></div>`;
                        }
                        if(data.location) {
                            htmlContent += `<p style="margin-top: 10px; font-size: 10px; color: blue;">📍 GPS Recorded (Lat: ${data.location.lat.toFixed(4)})</p>`;
                        }
                        if(data.audio) {
                            htmlContent += `<audio controls src="${data.audio}" style="width: 100%; margin-top: 10px; height: 30px;"></audio>`;
                        }

                        this.createPageElement("page-" + pageIndex, htmlContent, pageIndex);
                        pageIndex++;
                    }
                    
                    // Back Cover
                    this.createPageElement("book-back", `
                        <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100%;">
                            <h3>The End</h3>
                            <p style="font-size: 12px; margin-top: 20px;">Powered by MiTV Network Engine</p>
                        </div>
                    `, pageIndex);

                    this.totalPages = pageIndex;
                    this.currentPage = 0;
                    
                    document.getElementById('book-overlay').style.display = 'flex';
                });
            },
            
            createPageElement(id, content, zIndexInverse) {
                const page = document.createElement('div');
                page.className = 'page';
                page.id = 'b-page-' + zIndexInverse;
                // Reverse z-index so first page is on top
                page.style.zIndex = 100 - zIndexInverse;
                page.innerHTML = content;
                document.getElementById('3d-book-container').appendChild(page);
            },
            
            nextPage() {
                if(this.currentPage <= this.totalPages) {
                    const page = document.getElementById('b-page-' + this.currentPage);
                    if(page) {
                        page.classList.add('flipped');
                        this.currentPage++;
                    }
                }
            },
            
            prevPage() {
                if(this.currentPage > 0) {
                    this.currentPage--;
                    const page = document.getElementById('b-page-' + this.currentPage);
                    if(page) {
                        page.classList.remove('flipped');
                    }
                }
            },
            
            closeBook() {
                document.getElementById('book-overlay').style.display = 'none';
            }
        };

        // Initialize App
        window.onload = () => {
            AuthManager.init();
        };

    </script>
</body>
</html>
